  <line x1="0" y1="80"  x2="80"  y2="0"   stroke="#b8ef2e" stroke-width="1"/>
  <line x1="0" y1="160" x2="160" y2="0"   stroke="#b8ef2e" stroke-width="1"/>
  <line x1="0" y1="240" x2="240" y2="0"   stroke="#b8ef2e" stroke-width="1"/>
  <line x1="0" y1="320" x2="320" y2="0"   stroke="#b8ef2e" stroke-width="1"/>
  <line x1="0" y1="400" x2="400" y2="0"   stroke="#b8ef2e" stroke-width="1"/>
  <line x1="0" y1="480" x2="480" y2="0"   stroke="#b8ef2e" stroke-width="1"/>
  <line x1="0" y1="560" x2="560" y2="0"   stroke="#b8ef2e" stroke-width="1"/>
  <line x1="0" y1="640" x2="600" y2="40"  stroke="#b8ef2e" stroke-width="1"/>
  <line x1="0" y1="720" x2="600" y2="120" stroke="#b8ef2e" stroke-width="1"/>
  <line x1="0" y1="800" x2="600" y2="200" stroke="#b8ef2e" stroke-width="1"/>
  <line x1="80"  y1="800" x2="600" y2="280" stroke="#b8ef2e" stroke-width="1"/>
  <line x1="160" y1="800" x2="600" y2="360" stroke="#b8ef2e" stroke-width="1"/>
  <line x1="240" y1="800" x2="600" y2="440" stroke="#b8ef2e" stroke-width="1"/>
  <line x1="320" y1="800" x2="600" y2="520" stroke="#b8ef2e" stroke-width="1"/>
  <line x1="400" y1="800" x2="600" y2="600" stroke="#b8ef2e" stroke-width="1"/>
  <line x1="480" y1="800" x2="600" y2="680" stroke="#b8ef2e" stroke-width="1"/>
  <line x1="560" y1="800" x2="600" y2="760" stroke="#b8ef2e" stroke-width="1"/>
  <!-- center label box -->
  <rect x="100" y="320" width="400" height="160" rx="12" fill="#0f0f10" opacity="0.85"/>
  <text x="300" y="385" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#c8ff3e" letter-spacing="3">PLACEHOLDER</text>
