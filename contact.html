<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — AA24</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar" id="navbar">
  <a href="index.html" class="logo">AA24</a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="gallery.html">Work</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
  <button class="theme-btn" id="themeBtn" title="toggle theme">◐</button>
  <button class="hamburger" id="hamburger">
    <span></span><span></span><span></span>
  </button>
</nav>


<header class="page-head">
  <span class="kicker">04 / contact</span>
  <h1 class="big-title fade-in">Get in touch<span class="dot">.</span></h1>
</header>


<!-- contact section: form + sidebar -->
<section class="contact-grid">

  <!-- form -->
  <form class="contact-form fade-in" id="contactForm" novalidate>

    <div class="field">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your full name">
      <span class="err" id="errName"></span>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com">
      <span class="err" id="errEmail"></span>
    </div>

    <div class="field">
      <label for="subject">Subject</label>
      <input type="text" id="subject" name="subject" placeholder="What's it about?">
      <span class="err" id="errSubject"></span>
    </div>

    <div class="field">
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" placeholder="Type your message..."></textarea>
      <span class="err" id="errMessage"></span>
    </div>

    <button type="submit" class="cta-btn submit">Send message →</button>

    <!-- success message after submit -->
    <p class="success-msg" id="successMsg">Thanks! Your message has been sent ✓</p>

  </form>

  <!-- sidebar with extra info -->
  <aside class="contact-side fade-in">
    <span class="kicker">— elsewhere</span>
    <a href="https://instagram.com/ataaul_1" target="_blank" rel="noopener" class="big-link">
      Instagram <span class="lime">@ataaul_1 ↗</span>
    </a>

    <hr class="rule">

    <span class="kicker">— based in</span>
    <p class="big-text">Mauritius</p>

    <hr class="rule">

    <span class="kicker">— quote</span>
    <p class="quote-side">"Love for all, hatred for none."</p>
  </aside>

</section>


<footer class="site-footer">
  <div class="footer-row">
    <span>AA24 © 2026</span>
    <a href="https://instagram.com/ataaul_1" target="_blank" rel="noopener">@ataaul_1 ↗</a>
    <span>Mauritius</span>
  </div>
</footer>


<script src="script.js"></script>
</body>
</html>
